<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เล่นสตรีม HLS</title>
</head>
<body>

    <video id="video" controls width="640" height="360"></video>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        var video = document.getElementById('video');
        var videoSrc = "https://pd.cybar.xyz/Pd7WQJgt"; // เปลี่ยนเป็นลิงก์ของคุณ

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);  // โหลด URL ของไฟล์ M3U8 (หากมันเป็นไฟล์ HLS)
            hls.attachMedia(video);    // ผูกกับตัว player
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // สำหรับเบราว์เซอร์ที่รองรับ HLS โดยตรง เช่น Safari
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', function () {
                video.play();
            });
        }
    </script>

</body>
</html>
