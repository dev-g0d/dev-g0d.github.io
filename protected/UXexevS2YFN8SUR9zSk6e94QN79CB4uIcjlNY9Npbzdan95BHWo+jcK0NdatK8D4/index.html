<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        /* Dark theme for the whole page */
        body {
            background-color: #121212;
            color: #f1f1f1;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        /* Full screen video */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;  /* Ensures the entire video is visible without cropping */
            background-color: black;  /* Prevents black borders in case of aspect ratio mismatch */
        }

        /* Optional: Centered text for fallback message */
        video + p {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: white;
        }
    </style>
</head>
<body>

<video id="video" controls>
    <source src="https://pd.cybar.xyz/MnZrRMox" type="video/mp4">
    วิดีโอไม่สามารถเล่นได้
</video>

</body>
</html>
